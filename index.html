<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Árvore da Música Eletrônica</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background:#080810; color:#e0e0e0; font-family:'Segoe UI',sans-serif; overflow:hidden; height:100vh; display:flex; flex-direction:column; }
#header { text-align:center; padding:10px 16px 4px; flex-shrink:0; }
#header h1 { font-size:1.15rem; letter-spacing:3px; color:#00ffe7; text-shadow:0 0 18px #00ffe766; text-transform:uppercase; }
#header p { font-size:0.65rem; color:#444; margin-top:2px; letter-spacing:1px; }
#tabs { display:flex; justify-content:center; gap:4px; padding:5px 12px 0; flex-shrink:0; }
#controls { display:flex; flex-wrap:wrap; gap:5px; justify-content:center; padding:5px 12px 4px; flex-shrink:0; background:#0e0e18; border-bottom:1px solid #14142a; }
.filter-btn { padding:3px 10px; border-radius:20px; border:1px solid #222; background:transparent; color:#666; font-size:0.63rem; cursor:pointer; letter-spacing:0.8px; text-transform:uppercase; transition:all 0.2s; }
.filter-btn:hover,.filter-btn.active { border-color:var(--c,#00ffe7); color:var(--c,#00ffe7); background:var(--c,#00ffe7)11; }
#hint { text-align:center; font-size:0.6rem; color:#1e1e2a; padding:2px 0; flex-shrink:0; }
#view-tree { flex:1; overflow:hidden; display:block; position:relative; }
#zoom-controls { position:absolute; bottom:16px; left:16px; display:flex; flex-direction:column; gap:4px; z-index:50; }
.zoom-btn { width:32px; height:32px; background:#141428; border:1px solid #2a2a44; color:#aaa; font-size:1.1rem; cursor:pointer; border-radius:4px; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
.zoom-btn:hover { background:#1e1e38; color:#00ffe7; border-color:#00ffe744; }
#reset-btn { position:absolute; bottom:16px; left:56px; padding:0 10px; height:32px; background:#141428; border:1px solid #2a2a44; color:#888; font-size:0.62rem; cursor:pointer; border-radius:4px; letter-spacing:1px; text-transform:uppercase; transition:all 0.15s; z-index:50; }
#reset-btn:hover { color:#00ffe7; border-color:#00ffe744; }
#infl-toggle { position:absolute; bottom:16px; right:16px; z-index:50; padding:0 14px; height:32px; background:#141428; border:1px solid #2a2a44; color:#888; font-size:0.62rem; cursor:pointer; border-radius:4px; letter-spacing:1px; text-transform:uppercase; transition:all 0.15s; }
#infl-toggle.on { color:#ff9f43; border-color:#ff9f4355; background:#ff9f4311; }
svg { display:block; width:100%; height:100%; }
#panel { position:fixed; right:0; top:0; bottom:0; width:310px; background:#0c0c1a; border-left:1px solid #1a1a2a; padding:18px 16px; transform:translateX(100%); transition:transform 0.28s ease; overflow-y:auto; z-index:300; }
#panel.open { transform:translateX(0); }
#panel-close { position:absolute; top:10px; right:12px; background:none; border:none; color:#444; font-size:1.2rem; cursor:pointer; }
#panel-close:hover { color:#fff; }
#panel h2 { font-size:1rem; margin-right:22px; margin-bottom:2px; }
.era { font-size:0.65rem; color:#555; letter-spacing:2px; text-transform:uppercase; margin-bottom:10px; }
.st { font-size:0.59rem; text-transform:uppercase; letter-spacing:2px; color:#3a3a4a; margin:10px 0 4px; border-bottom:1px solid #14142a; padding-bottom:2px; }
.tag-list { display:flex; flex-wrap:wrap; gap:3px; }
.tag { background:#12122a; border:1px solid #222238; border-radius:3px; padding:2px 6px; font-size:0.67rem; color:#aaa; }
.bpm-bar { height:4px; background:#12122a; border-radius:2px; margin-top:4px; overflow:hidden; }
.bpm-fill { height:100%; border-radius:2px; }
.bpm-label { font-size:0.68rem; color:#777; margin-top:3px; }
.txt { font-size:0.73rem; line-height:1.65; color:#aaa; }
.desc { font-size:0.73rem; line-height:1.65; color:#777; }

#search-bar {
  display:flex; align-items:center; gap:8px;
  padding:5px 16px 5px; flex-shrink:0;
  background:#0a0a14; border-bottom:1px solid #14142a;
}
#search-input {
  flex:1; max-width:340px;
  background:#111122; border:1px solid #2a2a44;
  border-radius:6px; padding:6px 12px;
  color:#e0e0e0; font-size:0.82rem; outline:none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
#search-input:focus { border-color:#00ffe766; box-shadow:0 0 8px #00ffe722; }
#search-input::placeholder { color:#444; }
#search-btn {
  padding:6px 14px; background:#141428; border:1px solid #2a2a44;
  border-radius:6px; color:#aaa; font-size:0.72rem; cursor:pointer;
  letter-spacing:1px; text-transform:uppercase; transition:all 0.2s; white-space:nowrap;
}
#search-btn:hover { border-color:#00ffe755; color:#00ffe7; }
#search-clear {
  padding:6px 10px; background:transparent; border:1px solid #1e1e30;
  border-radius:6px; color:#555; font-size:0.72rem; cursor:pointer;
  transition:all 0.2s; display:none;
}
#search-clear:hover { color:#ff6b6b; border-color:#ff6b6b55; }
#search-results {
  font-size:0.72rem; color:#555; white-space:nowrap;
  letter-spacing:0.5px;
}
</style>
</head>
<body>
<div id="header">
  <h1>🎛 Árvore da Música Eletrônica</h1>
  <p>+60 gêneros · zoom/pan · linha do tempo · influências cruzadas</p>
</div>
<div id="controls">
  <button class="filter-btn active" style="--c:#00ffe7" onclick="ff('all',this)">Todos</button>
  <button class="filter-btn" style="--c:#ff6eb4" onclick="ff('synth',this)">Synth/EBM</button>
  <button class="filter-btn" style="--c:#ff4444" onclick="ff('techno',this)">Techno</button>
  <button class="filter-btn" style="--c:#cc4444" onclick="ff('industrial',this)">Industrial</button>
  <button class="filter-btn" style="--c:#ffd93d" onclick="ff('house',this)">House</button>
  <button class="filter-btn" style="--c:#6bcfff" onclick="ff('ambient',this)">Ambient/IDM</button>
  <button class="filter-btn" style="--c:#c77dff" onclick="ff('dnb',this)">D&B/Jungle</button>
  <button class="filter-btn" style="--c:#ff9f43" onclick="ff('rave',this)">Rave/Big Beat</button>
  <button class="filter-btn" style="--c:#2ed573" onclick="ff('trance',this)">Trance</button>
  <button class="filter-btn" style="--c:#f78fb3" onclick="ff('pop',this)">Electropop</button>
  <button class="filter-btn" style="--c:#00d2d3" onclick="ff('experimental',this)">Experimental</button>
  <button class="filter-btn" style="--c:#ffa502" onclick="ff('bass',this)">Bass Music</button>
</div>
<div id="hint">scroll = zoom · drag = mover · clique nos nós para detalhes</div>
<div id="search-bar">
  <input id="search-input" type="text" placeholder="Buscar artista... ex: Daft Punk, Aphex Twin, Prodigy" autocomplete="off" oninput="searchArtist(this.value)" onkeydown="if(event.key==='Escape')clearSearch()"/>
  <button id="search-btn" onclick="searchArtist(document.getElementById('search-input').value)">Buscar</button>
  <button id="search-clear" onclick="clearSearch()">✕ Limpar</button>
  <span id="search-results"></span>
</div>
<div id="view-tree">
  <svg id="tree-svg"></svg>
  <div id="zoom-controls">
    <button class="zoom-btn" onclick="doZoom(1.3)">+</button>
    <button class="zoom-btn" onclick="doZoom(0.77)">−</button>
  </div>
  <button id="reset-btn" onclick="resetZoom()">Reset View</button>
  <button id="infl-toggle" onclick="toggleInfluences()">⚡ Influências Cruzadas</button>
</div>
<div id="panel">
  <button id="panel-close" onclick="closePanel()">✕</button>
  <h2 id="p-name"></h2>
  <div class="era" id="p-era"></div>
  <div class="st">Descrição</div><div class="desc" id="p-desc"></div>
  <div class="st">BPM Típico</div>
  <div class="bpm-label" id="p-bpm-label"></div>
  <div class="bpm-bar"><div class="bpm-fill" id="p-bpm-fill"></div></div>
  <div class="st">Características Técnicas</div><div class="tag-list" id="p-tags"></div>
  <div class="st">Artistas / Bandas Chave</div><div class="txt" id="p-artists"></div>
  <div class="st">Influências Recebidas</div><div class="txt" id="p-infl"></div>
  <div class="st">Influenciou</div><div class="txt" id="p-inflout"></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>

let curFam='all', showInfl=false, tZoom, nodePos={};

function col(n){return G[n]?G[n].c:'#666';}
function fam(n){return G[n]?G[n].f:'other';}

function buildTree(){
  nodePos={};
  const el=document.getElementById('view-tree');
  const W=el.clientWidth||900, H=el.clientHeight||600;
  d3.select('#tree-svg').selectAll('*').remove();
  const svg=d3.select('#tree-svg').attr('width',W).attr('height',H);

  const root0=d3.hierarchy(treeData);
  const leaves=root0.leaves().length;
  const tH=Math.max(H*1.8,leaves*26), tW=Math.max(W*2,1400);

  // defs
  const defs=svg.append('defs');
  const filt=defs.append('filter').attr('id','glow');
  filt.append('feGaussianBlur').attr('stdDeviation','2.5').attr('result','coloredBlur');
  const fm=filt.append('feMerge');
  fm.append('feMergeNode').attr('in','coloredBlur');
  fm.append('feMergeNode').attr('in','SourceGraphic');

  const g=svg.append('g').attr('class','tree-root');
  tZoom=d3.zoom().scaleExtent([0.12,4]).on('zoom',e=>g.attr('transform',e.transform));
  svg.call(tZoom);

  const root=d3.hierarchy(treeData);
  d3.tree().size([tH,tW-240])(root);

  root.descendants().forEach(d=>{nodePos[d.data.name]={x:d.y+16,y:d.x+24};});
  // Center view on root node
  const rootNode=root;
  const rootX=rootNode.y+16, rootY=rootNode.x+24;
  const sc=0.54;
  svg.call(tZoom.transform, d3.zoomIdentity.translate(W*0.06 - rootX*sc, H/2 - rootY*sc).scale(sc));

  // links
  g.append('g').selectAll('path').data(root.links()).enter().append('path')
    .attr('fill','none')
    .attr('stroke',d=>{const n=d.target.data.name,show=curFam==='all'||fam(n)===curFam;return show?col(n)+'32':'#0d0d14';})
    .attr('stroke-width',1.5)
    .attr('d',d3.linkHorizontal().x(d=>d.y+16).y(d=>d.x+24));

  // cross-influence layer
  const inflG=g.append('g').attr('class','infl-layer').style('display',showInfl?'block':'none');
  drawCross(inflG,defs);
  // re-apply search highlight if active
  if(activeSearch !== null) setTimeout(applySearchHighlight, 30);

  // nodes
  const node=g.append('g').selectAll('g').data(root.descendants()).enter().append('g')
    .attr('transform',d=>`translate(${d.y+16},${d.x+24})`)
    .style('opacity',d=>d.depth===0?1:(curFam==='all'||fam(d.data.name)===curFam)?1:0.07)
    .on('click',(e,d)=>{if(d.depth>0&&G[d.data.name])openPanel(d.data.name);});

  node.append('circle')
    .attr('r',d=>d.depth===0?20:d.depth===1?13:d.depth===2?9:d.depth===3?7:5.5)
    .attr('fill',d=>d.depth===0?'#0d0d1a':col(d.data.name)+'18')
    .attr('stroke',d=>d.depth===0?'#00ffe7':col(d.data.name))
    .attr('stroke-width',d=>d.depth===0?2:d.depth<=2?1.8:1.3)
    .style('cursor',d=>d.depth>0?'pointer':'default')
    .style('filter',d=>d.depth<=1?'url(#glow)':'none');

  node.append('text')
    .attr('dy','0.32em')
    .attr('x',d=>d.depth===0?0:(d.children?-16:11))
    .attr('text-anchor',d=>d.depth===0?'middle':(d.children?'end':'start'))
    .attr('font-size',d=>d.depth===0?13:d.depth===1?14:d.depth===2?13:12)
    .attr('font-weight',d=>d.depth<=1?'700':d.depth===2?'600':'400')
    .attr('fill',d=>d.depth===0?'#00ffe7':col(d.data.name))
    .style('cursor',d=>d.depth>0?'pointer':'default')
    .each(function(d){
      if(d.depth===0){const lines=d.data.name.split('\n'),el=d3.select(this);el.text('');lines.forEach((l,i)=>el.append('tspan').attr('x',0).attr('dy',i===0?`-${(lines.length-1)*5.5}px`:'12px').text(l));}
      else d3.select(this).text(d.data.name);
    });
}

function drawCross(container,defs){
  container.selectAll('*').remove();
  CROSS.forEach((inf,i)=>{
    const s=nodePos[inf.s],t=nodePos[inf.t];
    if(!s||!t) return;
    const dx=t.x-s.x,dy=t.y-s.y,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<5) return;
    const mx=(s.x+t.x)/2,my=(s.y+t.y)/2,perp=90;
    const nx=-dy/dist*perp,ny=dx/dist*perp;
    const sc=G[inf.s]?G[inf.s].c:'#ff9f43',tc=G[inf.t]?G[inf.t].c:'#ff9f43';
    const gid=`ig${i}`;
    const gr=defs.append('linearGradient').attr('id',gid).attr('gradientUnits','userSpaceOnUse')
      .attr('x1',s.x).attr('y1',s.y).attr('x2',t.x).attr('y2',t.y);
    gr.append('stop').attr('offset','0%').attr('stop-color',sc).attr('stop-opacity',0.55);
    gr.append('stop').attr('offset','100%').attr('stop-color',tc).attr('stop-opacity',0.55);
    const mid=`am${i}`;
    const mk=defs.append('marker').attr('id',mid).attr('viewBox','0 -4 8 8').attr('refX',6).attr('refY',0).attr('markerWidth',5).attr('markerHeight',5).attr('orient','auto');
    mk.append('path').attr('d','M0,-4L8,0L0,4').attr('fill',tc).attr('opacity',0.7);
    container.append('path')
      .attr('d',`M${s.x},${s.y} Q${mx+nx},${my+ny} ${t.x},${t.y}`)
      .attr('fill','none').attr('stroke',`url(#${gid})`).attr('stroke-width',1.4)
      .attr('stroke-dasharray','5,3').attr('marker-end',`url(#${mid})`).attr('opacity',0.75)
      .append('title').text(`${inf.s} → ${inf.t}: ${inf.l}`);
  });
}

function toggleInfluences(){
  showInfl=!showInfl;
  const btn=document.getElementById('infl-toggle');
  btn.classList.toggle('on',showInfl);
  btn.textContent=showInfl?'⚡ Influências ON':'⚡ Influências Cruzadas';
  d3.select('.infl-layer').style('display',showInfl?'block':'none');
}
function doZoom(f){d3.select('#tree-svg').transition().duration(280).call(tZoom.scaleBy,f);}
function resetZoom(){
  const el=document.getElementById('view-tree'),W=el.clientWidth||900,H=el.clientHeight||600;
  d3.select('#tree-svg').transition().duration(400).call(tZoom.transform,d3.zoomIdentity.translate(60,H*0.5).scale(0.52));
}


function ff(f,btn){
  curFam=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  buildTree();
}

function openPanel(name){
  const g=G[name];if(!g) return;
  document.getElementById('p-name').textContent=name;
  document.getElementById('p-name').style.color=g.c;
  document.getElementById('p-era').textContent=g.e;
  document.getElementById('p-desc').textContent=g.d;
  const mn=g.b[0],mx=g.b[1];
  document.getElementById('p-bpm-label').textContent=mn===0&&mx===999?'Livre — sem BPM definido':mn===0?`Sem BPM fixo / até ${mx} BPM`:mx>=999?`${mn}+ BPM`:`${mn} – ${mx} BPM`;
  const fill=document.getElementById('p-bpm-fill');
  fill.style.width=Math.min(mn===0||mx>=999?12:Math.round(((mx-60)/200)*100),100)+'%';
  fill.style.background=`linear-gradient(90deg,${g.c}66,${g.c})`;
  document.getElementById('p-tags').innerHTML=g.ch.map(c=>`<span class="tag">${c}</span>`).join('');
  document.getElementById('p-artists').textContent=g.a;
  document.getElementById('p-infl').textContent=g.i;
  document.getElementById('p-inflout').textContent=g.o||'—';
  document.getElementById('panel').classList.add('open');
}

// ══════════════════════════════════════════════
// ARTIST SEARCH
// ══════════════════════════════════════════════
let activeSearch = null; // list of genre names matching search

function searchArtist(query) {
  query = query.trim();
  if (!query) { clearSearch(); return; }

  const q = query.toLowerCase();
  const matches = [];

  Object.entries(G).forEach(([name, gd]) => {
    // search in artist list (a field)
    const artists = gd.a.toLowerCase();
    if (artists.includes(q)) {
      matches.push(name);
    }
  });

  activeSearch = matches.length > 0 ? matches : [];

  const resultsEl = document.getElementById('search-results');
  const clearBtn = document.getElementById('search-clear');

  if (matches.length > 0) {
    resultsEl.innerHTML = `<span style="color:#00ffe7">✓</span> <span style="color:#aaa">${matches.length} gênero${matches.length>1?'s':''}: </span>` +
      matches.map(m => `<span style="color:${G[m].c};font-weight:600">${m}</span>`).join(' · ');
    clearBtn.style.display = 'inline-block';
  } else {
    resultsEl.innerHTML = `<span style="color:#664444">Artista não encontrado — tente outro nome</span>`;
    clearBtn.style.display = 'inline-block';
  }

  applySearchHighlight();
}

function clearSearch() {
  activeSearch = null;
  document.getElementById('search-input').value = '';
  document.getElementById('search-results').innerHTML = '';
  document.getElementById('search-clear').style.display = 'none';
  applySearchHighlight();
}

function applySearchHighlight() {
  if (!activeSearch) {
    // restore normal opacity
    d3.select('#tree-svg').selectAll('.nodes g')
      .style('opacity', d => (!d||!d.data) ? 1 : d.depth === 0 ? 1 : (curFam === 'all' || fam(d.data.name) === curFam) ? 1 : 0.07);
    d3.select('#tree-svg').selectAll('.nodes circle')
      .attr('stroke-width', d => d.depth === 0 ? 2 : d.depth <= 2 ? 1.8 : 1.3)
      .attr('r', d => d.depth===0?20:d.depth===1?13:d.depth===2?9:d.depth===3?7:5.5)
      .style('filter', d => d.depth <= 1 ? 'url(#glow)' : 'none');
    d3.select('#tree-svg').selectAll('.nodes text')
      .style('font-weight', d => d.depth<=1?'700':d.depth===2?'600':'400');
    return;
  }

  const matchSet = new Set(activeSearch);

  d3.select('#tree-svg').selectAll('.nodes g')
    .style('opacity', d => {
      if (!d || !d.data) return 1;
      if (d.depth === 0) return 1;
      if (matchSet.has(d.data.name)) return 1;
      return 0.06;
    });

  d3.select('#tree-svg').selectAll('.nodes circle')
    .attr('r', d => {
      if(!d||!d.data) return 5;
      const base = d.depth===0?20:d.depth===1?13:d.depth===2?9:d.depth===3?7:5.5;
      return matchSet.has(d.data.name) ? base * 1.9 : base;
    })
    .attr('stroke-width', d => (!d||!d.data)?1.3:matchSet.has(d.data.name) ? 3 : d.depth===0?2:d.depth<=2?1.8:1.3)
    .style('filter', d => (!d||!d.data)?'none':matchSet.has(d.data.name) ? 'url(#glow)' : d.depth<=1?'url(#glow)':'none');

  d3.select('#tree-svg').selectAll('.nodes text')
    .style('font-weight', d => (!d||!d.data)?'400':matchSet.has(d.data.name) ? '800' : d.depth<=1?'700':d.depth===2?'600':'400')
    .style('font-size', d => {
      if(!d||!d.data) return '12px';
      if (matchSet.has(d.data.name)) return '16px';
      return d.depth===0?'13px':d.depth===1?'14px':d.depth===2?'13px':'12px';
    });

  // Auto-open panel if only one match
  if (activeSearch.length === 1) {
    openPanel(activeSearch[0]);
  }
}

function closePanel(){document.getElementById('panel').classList.remove('open');}

window.addEventListener('load',buildTree);
window.addEventListener('resize',buildTree);
// search highlight re-applied inside buildTree
